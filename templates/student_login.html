<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Login - AI-Powered Face Recognition Attendance System">
    <title>Student Login | Smart Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-animated"></div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card fade-in">

            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('signin')" id="signinTab">
                    <span class="auth-tab-icon">🔑</span> Sign in
                </button>
                <button class="auth-tab" onclick="switchTab('register')" id="registerTab">
                    <span class="auth-tab-icon">👤</span> Register
                </button>
            </div>

            <!-- Avatar -->
            <div class="auth-avatar">🎓</div>

            <!-- Flash Messages -->
            {% if message %}
            <div class="auth-message {{ message_type or 'error' }}">{{ message }}</div>
            {% endif %}

            <!-- Sign In Panel -->
            <div class="auth-panel active" id="signinPanel">
                <form class="auth-form" action="{{ url_for('student_login') }}" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="rollNumber">Username or e-mail</label>
                        <input type="text" id="rollNumber" name="roll_number" class="form-input"
                            placeholder="Enter your roll number" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="signinPassword">Password</label>
                        <input type="password" id="signinPassword" name="password" class="form-input"
                            placeholder="Enter your password" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">
                        Sign in
                    </button>
                </form>

                <div class="auth-switch">
                    <a onclick="switchTab('register')">register</a>
                </div>
            </div>

            <!-- Register Panel -->
            <div class="auth-panel" id="registerPanel">
                <form class="auth-form" action="{{ url_for('student_register') }}" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="regName">Full Name</label>
                        <input type="text" id="regName" name="name" class="form-input"
                            placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regRollNo">Roll Number</label>
                        <input type="text" id="regRollNo" name="roll_number" class="form-input"
                            placeholder="Enter your roll number" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regSection">Section</label>
                        <input type="text" id="regSection" name="section" class="form-input"
                            placeholder="Enter your section (e.g. A)" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regPassword">Password</label>
                        <input type="password" id="regPassword" name="password" class="form-input"
                            placeholder="Enter a password" required autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regConfirm">Confirm password</label>
                        <input type="password" id="regConfirm" name="confirm_password" class="form-input"
                            placeholder="Confirm your password" required autocomplete="new-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">
                        Register
                    </button>
                </form>

                <div class="auth-switch">
                    <a onclick="switchTab('signin')">sign in</a>
                </div>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p><a href="{{ url_for('role_select') }}">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        function switchTab(tab) {
            document.getElementById('signinTab').classList.toggle('active', tab === 'signin');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('signinPanel').classList.toggle('active', tab === 'signin');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
        }

        // Auto-switch to register tab if redirected after registration
        {% if show_register %}
        switchTab('register');
        {% endif %}
    </script>
</body>

</html>

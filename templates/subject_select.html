<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Subject Selection - AI-Powered Face Recognition Attendance System">
    <title>Select Subject | Smart Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Subject Selection Specific Styles */
        .subject-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .subject-card {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .subject-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .subject-header-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .subject-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .subject-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .subject-option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .subject-option:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        .subject-option.selected {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
        }

        .subject-option input[type="radio"] {
            display: none;
        }

        .subject-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .subject-name {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .subject-code {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .subject-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .subject-actions .btn {
            flex: 1;
        }

        .user-welcome {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .user-welcome-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            font-size: 1.1rem;
        }

        .user-welcome-info h4 {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .user-welcome-info p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .subject-grid {
                grid-template-columns: 1fr;
            }
            
            .subject-card {
                padding: 2rem;
            }
        }
    </style>
</head>

<body class="theme-dark">
    <!-- Animated Background -->
    <div class="bg-animated"></div>

    <!-- Subject Selection Container -->
    <div class="subject-container">
        <div class="subject-card fade-in">
            <!-- Welcome Message -->
            <div class="user-welcome">
                <div class="user-welcome-avatar">FK</div>
                <div class="user-welcome-info">
                    <h4>Welcome, Prof. Faculty</h4>
                    <p>Select a subject to take attendance</p>
                </div>
            </div>

            <!-- Header -->
            <div class="subject-header">
                <span class="subject-header-icon">📚</span>
                <h2>Select Subject</h2>
                <p>Choose the subject for today's attendance session</p>
            </div>

            <!-- Subject Selection Form -->
            <form action="{{ url_for('select_subject') }}" method="POST" id="subjectForm">
                <div class="subject-grid">
                    <label class="subject-option" for="ai">
                        <input type="radio" name="subject" id="ai" value="Artificial Intelligence" required>
                        <span class="subject-icon">🤖</span>
                        <div class="subject-name">Artificial Intelligence</div>
                        <div class="subject-code">CS601</div>
                    </label>

                    <label class="subject-option" for="ml">
                        <input type="radio" name="subject" id="ml" value="Machine Learning">
                        <span class="subject-icon">🧠</span>
                        <div class="subject-name">Machine Learning</div>
                        <div class="subject-code">CS602</div>
                    </label>

                    <label class="subject-option" for="dbms">
                        <input type="radio" name="subject" id="dbms" value="Database Management">
                        <span class="subject-icon">🗄️</span>
                        <div class="subject-name">Database Management</div>
                        <div class="subject-code">CS501</div>
                    </label>

                    <label class="subject-option" for="cn">
                        <input type="radio" name="subject" id="cn" value="Computer Networks">
                        <span class="subject-icon">🌐</span>
                        <div class="subject-name">Computer Networks</div>
                        <div class="subject-code">CS502</div>
                    </label>

                    <label class="subject-option" for="os">
                        <input type="radio" name="subject" id="os" value="Operating Systems">
                        <span class="subject-icon">💻</span>
                        <div class="subject-name">Operating Systems</div>
                        <div class="subject-code">CS401</div>
                    </label>

                    <label class="subject-option" for="se">
                        <input type="radio" name="subject" id="se" value="Software Engineering">
                        <span class="subject-icon">⚙️</span>
                        <div class="subject-name">Software Engineering</div>
                        <div class="subject-code">CS503</div>
                    </label>
                </div>

                <!-- Actions -->
                <div class="subject-actions">
                    <a href="{{ url_for('logout') }}" class="btn btn-outline">
                        <span class="btn-icon">←</span>
                        Back
                    </a>
                    <button type="submit" class="btn btn-primary btn-lg">
                        <span class="btn-icon">▶️</span>
                        Proceed to Dashboard
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Handle subject selection visual feedback
        document.querySelectorAll('.subject-option').forEach(option => {
            option.addEventListener('click', function() {
                // Remove selected class from all options
                document.querySelectorAll('.subject-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                // Add selected class to clicked option
                this.classList.add('selected');
            });
        });
    </script>
</body>

</html>

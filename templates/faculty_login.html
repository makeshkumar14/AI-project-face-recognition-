<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Faculty Login - AI-Powered Face Recognition Attendance System">
    <title>Faculty Login | Smart Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- Video Background -->
    <video autoplay muted loop id="bg-video">
        <source src="{{ url_for('static', filename='background.mp4') }}" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card fade-in">

            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('signin')" id="signinTab">
                    <span class="auth-tab-icon">🔑</span> Sign in
                </button>
                <button class="auth-tab" onclick="switchTab('register')" id="registerTab">
                    <span class="auth-tab-icon">👤</span> Register
                </button>
            </div>

            <!-- Avatar -->
            <div class="auth-avatar">👨‍🏫</div>

            <!-- Flash Messages -->
            {% if message %}
            <div class="auth-message {{ message_type or 'error' }}">
                {{ message }}
                {% if show_register_option %}
                <br><a href="#" onclick="switchTab('register')" style="color: inherit; text-decoration: underline; margin-top: 5px; display: inline-block;">Register a new account here</a>
                {% endif %}
            </div>
            {% endif %}

            <!-- Sign In Panel -->
            <div class="auth-panel active" id="signinPanel">
                <form class="auth-form" action="{{ url_for('faculty_login') }}" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="facultyId">Enter your Email ID</label>
                        <input type="email" id="facultyId" name="faculty_id" class="form-input"
                            placeholder="Enter your email" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="signinPassword">Password</label>
                        <input type="password" id="signinPassword" name="password" class="form-input"
                            placeholder="Enter your password" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">
                        Sign in
                    </button>
                </form>

                <div class="auth-switch">
                    <a onclick="switchTab('register')">register</a>
                </div>
            </div>

            <!-- Register Panel -->
            <div class="auth-panel" id="registerPanel">
                <form class="auth-form" action="{{ url_for('faculty_register') }}" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="regName">Full Name</label>
                        <input type="text" id="regName" name="name" class="form-input"
                            placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regEmail">Username or e-mail</label>
                        <input type="email" id="regEmail" name="email" class="form-input"
                            placeholder="Enter your email" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regPassword">Password</label>
                        <input type="password" id="regPassword" name="password" class="form-input"
                            placeholder="Enter a password" required autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regDept">Department</label>
                        <select id="regDept" name="department" class="form-input" style="background: rgba(26,26,46,0.95); color: white;" required>
                            <option value="">Select Department</option>
                            <option value="CSE">CSE – Computer Science</option>
                            <option value="ECE">ECE – Electronics</option>
                            <option value="IT">IT – Information Technology</option>
                            <option value="EEE">EEE – Electrical</option>
                            <option value="MECH">MECH – Mechanical</option>
                            <option value="CIVIL">CIVIL – Civil Engineering</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regConfirm">Confirm password</label>
                        <input type="password" id="regConfirm" name="confirm_password" class="form-input"
                            placeholder="Confirm your password" required autocomplete="new-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">
                        Register
                    </button>
                </form>

                <div class="auth-switch">
                    <a onclick="switchTab('signin')">sign in</a>
                </div>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p><a href="{{ url_for('faculty_login') }}">← Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        function switchTab(tab) {
            document.getElementById('signinTab').classList.toggle('active', tab === 'signin');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('signinPanel').classList.toggle('active', tab === 'signin');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
        }

        // Auto-switch to register tab if redirected after registration or if sign-in failed
        {% if show_register or show_register_option %}
        switchTab('register');
        {% endif %}
    </script>
</body>

</html>

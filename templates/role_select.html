<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Powered Face Recognition Attendance System - Modern attendance tracking using artificial intelligence">
    <title>Face Recognition Attendance System | Select Role</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animated"></div>

    <!-- Main Content -->
    <div class="role-select-container">
        <div class="role-select-content fade-in">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-icon">
                    🎯
                </div>
                <h1>Smart Attendance</h1>
                <p>AI-Powered Face Recognition Attendance System</p>
            </div>

            <!-- Role Selection Cards -->
            <div class="role-cards">
                <!-- Faculty Card -->
                <a href="{{ url_for('faculty_login') }}" class="role-card slide-up delay-1" id="facultyCard">
                    <div class="role-icon">
                        👨‍🏫
                    </div>
                    <h3>Faculty Login</h3>
                    <p>Access dashboard to manage and monitor student attendance in real-time</p>
                </a>

                <!-- Student Card -->
                <a href="{{ url_for('student_login') }}" class="role-card slide-up delay-2" id="studentCard">
                    <div class="role-icon">
                        🎓
                    </div>
                    <h3>Student Login</h3>
                    <p>View your attendance records and current status at a glance</p>
                </a>
            </div>

            <!-- Footer Info -->
            <div class="mt-4 text-center text-muted fade-in delay-3">
                <p>Powered by Advanced Face Recognition Technology</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
